<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Head -->
  <rect x="18" y="2" width="10" height="7" fill="#fff"/>
  <!-- Eye -->
  <rect x="26" y="3" width="2" height="2" fill="#111"/>
  <!-- Jaw / mouth open bottom -->
  <rect x="22" y="8" width="6" height="2" fill="#fff"/>
  <!-- Neck -->
  <rect x="16" y="6" width="4" height="6" fill="#fff"/>
  <!-- Body -->
  <rect x="8" y="10" width="14" height="10" fill="#fff"/>
  <!-- Tiny arm -->
  <rect x="18" y="14" width="4" height="3" fill="#fff"/>
  <rect x="20" y="17" width="3" height="2" fill="#fff"/>
  <!-- Tail -->
  <rect x="4" y="12" width="6" height="4" fill="#fff"/>
  <rect x="2" y="14" width="4" height="3" fill="#fff"/>
  <!-- Left leg -->
  <rect x="10" y="20" width="4" height="8" fill="#fff"/>
  <rect x="9"  y="27" width="5" height="2" fill="#fff"/>
  <!-- Right leg (offset / running pose) -->
  <rect x="16" y="20" width="4" height="6" fill="#fff"/>
  <rect x="15" y="25" width="5" height="2" fill="#fff"/>
</svg>
